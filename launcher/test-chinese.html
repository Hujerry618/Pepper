<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试中文路径</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        .test-btn { 
            display: block; 
            margin: 10px 0; 
            padding: 10px 20px; 
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🌶️ 中文路径测试</h1>
    <p>点击以下按钮测试中文路径是否正常：</p>
    
    <button class="test-btn" onclick="test('C:\\Windows\\System32\\notepad.exe')">
        测试 1: 记事本 (无中文)
    </button>
    
    <button class="test-btn" onclick="test('C:\\Windows\\System32\\calc.exe')">
        测试 2: 计算器 (无中文)
    </button>
    
    <hr>
    <p style="color: #666; font-size: 14px;">
        如果上面能正常工作，说明协议已修复。<br>
        然后刷新 Personal Panel 页面，点击微信卡片测试。
    </p>
    
    <script>
        function test(path) {
            const protocolUrl = 'mypanel://file:///' + path.replace(/\\/g, '/');
            console.log('Testing:', protocolUrl);
            window.location.href = protocolUrl;
        }
    </script>
</body>
</html>
