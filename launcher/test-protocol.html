<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 协议快速测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .status-icon { font-size: 3rem; margin-bottom: 10px; }
        .status-text { font-size: 1.1rem; color: #a0aec0; }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        button:active { transform: translateY(-1px); }
        .result {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: Consolas, monospace;
            font-size: 0.9rem;
            text-align: left;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        .warning { color: #fbbf24; }
        .tip {
            background: rgba(251,191,36,0.1);
            border-left: 4px solid #fbbf24;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 0 8px 8px 0;
        }
        .tip-title { font-weight: 600; color: #fbbf24; margin-bottom: 8px; }
        .tip-content { color: #a0aec0; font-size: 0.9rem; line-height: 1.6; }
        code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 mypanel:// 协议测试</h1>
        
        <div class="status">
            <div class="status-icon">🧪</div>
            <div class="status-text">点击下方按钮测试协议是否正常工作</div>
        </div>

        <div class="btn-group">
            <button onclick="testNotepad()">📝 记事本</button>
            <button onclick="testCalculator()">🔢 计算器</button>
            <button onclick="testExplorer()">📁 文件夹</button>
            <button onclick="testChrome()">🌐 Chrome</button>
        </div>

        <div class="tip">
            <div class="tip-title">💡 如果提示"无法打开链接"</div>
            <div class="tip-content">
                1. 这是浏览器的安全提示，选择<strong>「允许」</strong>或<strong>「打开」</strong><br>
                2. 如果没看到提示，检查浏览器地址栏右侧是否有🚫图标<br>
                3. Edge 浏览器：设置 → Cookie 和网站权限 → 协议处理程序 → 允许
            </div>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const result = document.getElementById('result');
        
        function log(message, type = 'info') {
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            result.innerHTML += `\n${icon} ${message}`;
            result.scrollTop = result.scrollHeight;
        }

        function clearResult() {
            result.innerHTML = '<span class="info">开始测试...</span>';
        }

        function testNotepad() {
            clearResult();
            log('尝试打开记事本...', 'info');
            log('协议 URL: mypanel://file:///C:/Windows/System32/notepad.exe', 'info');
            
            setTimeout(() => {
                try {
                    window.location.href = 'mypanel://file:///C:/Windows/System32/notepad.exe';
                    log('命令已发送，请检查是否打开记事本', 'success');
                    log('如果没反应，查看浏览器是否阻止了协议', 'warning');
                } catch(e) {
                    log('错误：' + e.message, 'error');
                }
            }, 500);
        }

        function testCalculator() {
            clearResult();
            log('尝试打开计算器...', 'info');
            
            setTimeout(() => {
                try {
                    window.location.href = 'mypanel://file:///C:/Windows/System32/Calculator.exe';
                    log('命令已发送，请检查是否打开计算器', 'success');
                } catch(e) {
                    log('错误：' + e.message, 'error');
                }
            }, 500);
        }

        function testExplorer() {
            clearResult();
            log('尝试打开 C 盘...', 'info');
            
            setTimeout(() => {
                try {
                    window.location.href = 'mypanel://file:///C:/';
                    log('命令已发送，请检查是否打开资源管理器', 'success');
                } catch(e) {
                    log('错误：' + e.message, 'error');
                }
            }, 500);
        }

        function testChrome() {
            clearResult();
            const chromePaths = [
                'C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe',
                'C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe'
            ];
            
            log('尝试打开 Chrome...', 'info');
            log('测试路径：' + chromePaths[0], 'info');
            
            setTimeout(() => {
                try {
                    window.location.href = 'mypanel://file:///' + chromePaths[0].replace(/\\/g, '/');
                    log('命令已发送，请检查是否打开 Chrome', 'success');
                } catch(e) {
                    log('错误：' + e.message, 'error');
                }
            }, 500);
        }

        // 页面加载时自动检测
        window.onload = () => {
            log('=== mypanel:// 协议测试工具 ===', 'info');
            log('浏览器：' + navigator.userAgent, 'info');
            log('协议状态：等待测试...', 'warning');
            log('', 'info');
            log('点击上方按钮开始测试', 'info');
        };
    </script>
</body>
</html>
