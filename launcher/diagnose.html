<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 协议诊断工具</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #0f0f23;
            color: #e0e0e0;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .section {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .section h2 { color: #4ade80; margin-top: 0; font-size: 1.2rem; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .result {
            background: #0f0f23;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: Consolas, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .warning { color: #fbbf24; }
        .info { color: #60a5fa; }
        code { background: #0f3460; padding: 2px 6px; border-radius: 4px; }
        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
        }
        .check-icon { font-size: 1.2rem; }
        label { display: block; margin: 10px 0 5px; color: #9ca3af; }
        input {
            width: 100%;
            padding: 10px;
            background: #0f0f23;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <h1>🔧 mypanel:// 协议诊断工具</h1>
    <p style="color: #9ca3af;">全面检测协议处理器配置和 Personal Panel 数据</p>

    <div class="section">
        <h2>📋 检查 1: 注册表配置</h2>
        <button onclick="checkRegistry()">检查注册表</button>
        <div class="result" id="registryResult"></div>
    </div>

    <div class="section">
        <h2>🧪 检查 2: 协议测试</h2>
        <button onclick="testNotepad()">测试记事本</button>
        <button onclick="testCalculator()">测试计算器</button>
        <button onclick="testExplorer()">测试资源管理器</button>
        <div class="result" id="protocolResult"></div>
    </div>

    <div class="section">
        <h2>📊 检查 3: Personal Panel 数据</h2>
        <button onclick="loadPanelData()">加载数据</button>
        <button onclick="fixOldData()">修复旧数据</button>
        <div class="result" id="dataResult"></div>
    </div>

    <div class="section">
        <h2>🔧 检查 4: 手动测试</h2>
        <label>输入程序路径：</label>
        <input type="text" id="testPath" value="C:\Windows\System32\notepad.exe" />
        <button onclick="testCustomPath()">测试路径</button>
        <div class="result" id="customResult"></div>
    </div>

    <script>
        // 检查注册表
        async function checkRegistry() {
            const result = document.getElementById('registryResult');
            result.innerHTML = '<span class="info">正在检查注册表...</span>';
            
            try {
                // 通过执行命令检查（需要后端支持，这里仅显示说明）
                result.innerHTML = `<span class="info">请手动检查注册表：</span>

1. 按 <code>Win + R</code>
2. 输入 <code>regedit</code>
3. 导航到：
   <code>HKEY_CLASSES_ROOT\\mypanel\\shell\\open\\command</code>
4. 确认默认值为：
   <code>wscript.exe C:\\Users\\Administrator\\.openclaw\\workspace\\apps\\personal-panel\\launcher\\launcher.vbs %1</code>

如果路径不正确，请重新运行 <code>install.bat</code>（管理员权限）`;
            } catch(e) {
                result.innerHTML = `<span class="error">检查失败：${e.message}</span>`;
            }
        }

        // 测试记事本
        function testNotepad() {
            const result = document.getElementById('protocolResult');
            result.innerHTML = '<span class="info">尝试打开记事本...</span>';
            
            try {
                window.location.href = 'mypanel://file:///C:/Windows/System32/notepad.exe';
                setTimeout(() => {
                    result.innerHTML += '\n<span class="success">✅ 命令已发送（请检查是否打开记事本）</span>';
                }, 1000);
            } catch(e) {
                result.innerHTML = `<span class="error">❌ 失败：${e.message}</span>`;
            }
        }

        // 测试计算器
        function testCalculator() {
            const result = document.getElementById('protocolResult');
            result.innerHTML = '<span class="info">尝试打开计算器...</span>';
            
            try {
                window.location.href = 'mypanel://file:///C:/Windows/System32/Calculator.exe';
                setTimeout(() => {
                    result.innerHTML += '\n<span class="success">✅ 命令已发送（请检查是否打开计算器）</span>';
                }, 1000);
            } catch(e) {
                result.innerHTML = `<span class="error">❌ 失败：${e.message}</span>`;
            }
        }

        // 测试资源管理器
        function testExplorer() {
            const result = document.getElementById('protocolResult');
            result.innerHTML = '<span class="info">尝试打开 C 盘...</span>';
            
            try {
                window.location.href = 'mypanel://file:///C:/';
                setTimeout(() => {
                    result.innerHTML += '\n<span class="success">✅ 命令已发送（请检查是否打开资源管理器）</span>';
                }, 1000);
            } catch(e) {
                result.innerHTML = `<span class="error">❌ 失败：${e.message}</span>`;
            }
        }

        // 加载 Personal Panel 数据
        function loadPanelData() {
            const result = document.getElementById('dataResult');
            
            try {
                const dataStr = localStorage.getItem('personalPanelData');
                if (!dataStr) {
                    result.innerHTML = '<span class="warning">⚠️ 未找到 Personal Panel 数据（可能从未保存过）</span>';
                    return;
                }
                
                const data = JSON.parse(dataStr);
                let output = '<span class="success">✅ 数据加载成功</span>\n\n';
                output += '左侧分类（办公场景）:\n';
                data.left.forEach(cat => {
                    output += `  📁 ${cat.name} (${cat.websites.length} 个项目)\n`;
                    cat.websites.forEach(w => {
                        const type = w.type || 'url';
                        const typeIcon = type === 'app' ? '🖥️' : type === 'dir' ? '📁' : '🌐';
                        output += `    ${typeIcon} ${w.name}: ${w.url}\n`;
                    });
                });
                
                output += '\n右侧分类（休闲场景）:\n';
                data.right.forEach(cat => {
                    output += `  📁 ${cat.name} (${cat.websites.length} 个项目)\n`;
                    cat.websites.forEach(w => {
                        const type = w.type || 'url';
                        const typeIcon = type === 'app' ? '🖥️' : type === 'dir' ? '📁' : '🌐';
                        output += `    ${typeIcon} ${w.name}: ${w.url}\n`;
                    });
                });
                
                // 检查是否有 type=app 的项目
                const appItems = [...data.left, ...data.right]
                    .flatMap(c => c.websites)
                    .filter(w => w.type === 'app');
                
                if (appItems.length > 0) {
                    output += `\n<span class="success">✅ 找到 ${appItems.length} 个程序类型项目</span>\n`;
                    appItems.forEach(w => {
                        output += `  🖥️ ${w.name}: ${w.url}\n`;
                    });
                } else {
                    output += '\n<span class="warning">⚠️ 未找到程序类型项目（type=app）</span>\n';
                    output += '可能需要添加程序或修复旧数据\n';
                }
                
                result.innerHTML = output;
            } catch(e) {
                result.innerHTML = `<span class="error">❌ 加载失败：${e.message}</span>`;
            }
        }

        // 修复旧数据
        function fixOldData() {
            const result = document.getElementById('dataResult');
            
            try {
                const dataStr = localStorage.getItem('personalPanelData');
                if (!dataStr) {
                    result.innerHTML = '<span class="warning">⚠️ 没有数据需要修复</span>';
                    return;
                }
                
                const data = JSON.parse(dataStr);
                let fixed = 0;
                
                // 查找并修复微信等程序
                [...data.left, ...data.right].forEach(cat => {
                    cat.websites.forEach(w => {
                        // 如果 URL 是 Windows 路径但没有 type
                        if (!w.type && w.url && w.url.match(/^[A-Za-z]:\\/)) {
                            w.type = 'app';
                            fixed++;
                            console.log(`Fixed: ${w.name} -> type=app`);
                        }
                    });
                });
                
                if (fixed > 0) {
                    localStorage.setItem('personalPanelData', JSON.stringify(data));
                    result.innerHTML = `<span class="success">✅ 修复了 ${fixed} 个项目</span>\n请刷新 Personal Panel 页面`;
                } else {
                    result.innerHTML = '<span class="info">ℹ️ 没有需要修复的数据</span>';
                }
            } catch(e) {
                result.innerHTML = `<span class="error">❌ 修复失败：${e.message}</span>`;
            }
        }

        // 测试自定义路径
        function testCustomPath() {
            const path = document.getElementById('testPath').value.trim();
            const result = document.getElementById('customResult');
            
            if (!path) {
                result.innerHTML = '<span class="error">❌ 请输入路径</span>';
                return;
            }
            
            let protocolUrl = path;
            if (path.match(/^[A-Za-z]:\\/)) {
                protocolUrl = 'file:///' + path.replace(/\\/g, '/');
            }
            
            const finalUrl = 'mypanel://' + protocolUrl;
            
            result.innerHTML = `<span class="info">测试路径：</span>
路径：${path}
转换后：${protocolUrl}
协议 URL: ${finalUrl}

<span class="info">正在发送启动命令...</span>`;
            
            try {
                window.location.href = finalUrl;
                setTimeout(() => {
                    result.innerHTML += '\n<span class="success">✅ 命令已发送</span>\n请检查是否启动了程序';
                }, 1000);
            } catch(e) {
                result.innerHTML += `\n<span class="error">❌ 发送失败：${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
