<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微信路径测试</title>
    <style>
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            padding: 2rem; 
            background: #f5f7fa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 1rem; }
        .status { 
            padding: 1rem; 
            border-radius: 8px; 
            margin: 1rem 0;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .test-btn { 
            display: block; 
            margin: 10px 0; 
            padding: 12px 24px; 
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            transition: all 0.2s;
        }
        .test-btn:hover { background: #5a6fd6; transform: translateY(-2px); }
        .path-display {
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌶️ 微信路径测试</h1>
        
        <div id="status" class="status info">准备测试...</div>
        
        <h3>测试步骤：</h3>
        <ol style="margin: 1rem 0 1rem 2rem; line-height: 1.8;">
            <li>点击下方"测试微信"按钮</li>
            <li>如果微信启动，说明修复成功 ✅</li>
            <li>如果报错，请截图错误信息发给花椒</li>
        </ol>
        
        <h3>常见微信路径：</h3>
        <div class="path-display">D:\Program Files\Tencent\Weixin\Weixin.exe</div>
        <div class="path-display">C:\Program Files\Tencent\Weixin\Weixin.exe</div>
        <div class="path-display">%LOCALAPPDATA%\Programs\Tencent\Weixin\Weixin.exe</div>
        
        <hr style="margin: 2rem 0; border: none; border-top: 1px solid #e1e8ed;">
        
        <button class="test-btn" onclick="testWechat()">
            🚀 测试微信 (Weixin.exe)
        </button>
        
        <button class="test-btn" onclick="testNotepad()" style="background: #28a745;">
            📝 测试记事本 (验证基础功能)
        </button>
        
        <button class="test-btn" onclick="checkPathExists()" style="background: #17a2b8;">
            🔍 检查路径是否存在
        </button>
    </div>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        function setStatus(msg, type = 'info') {
            statusDiv.className = 'status ' + type;
            statusDiv.textContent = msg;
        }
        
        function testWechat() {
            // 尝试常见微信路径
            const paths = [
                'D:\\Program Files\\Tencent\\Weixin\\Weixin.exe',
                'C:\\Program Files\\Tencent\\Weixin\\Weixin.exe',
                'file:///D:/Program Files/Tencent/Weixin/Weixin.exe',
                'file:///C:/Program Files/Tencent/Weixin/Weixin.exe'
            ];
            
            // 使用用户之前报错的路径
            const testPath = 'file:///D:/Program Files/Tencent/Weixin/Weixin.exe';
            
            setStatus('正在测试：' + testPath, 'info');
            
            const protocolUrl = 'mypanel://' + testPath;
            console.log('Testing WeChat:', protocolUrl);
            
            // 延迟一下显示状态
            setTimeout(() => {
                setStatus('已发送协议调用\n\n如果微信没有启动，请检查：\n1. 微信是否安装在该路径\n2. 是否出现错误弹窗', 'info');
            }, 500);
            
            window.location.href = protocolUrl;
        }
        
        function testNotepad() {
            setStatus('测试记事本...', 'info');
            const protocolUrl = 'mypanel://file:///C:/Windows/System32/notepad.exe';
            console.log('Testing Notepad:', protocolUrl);
            window.location.href = protocolUrl;
        }
        
        function checkPathExists() {
            const paths = [
                'D:\\Program Files\\Tencent\\Weixin\\Weixin.exe',
                'C:\\Program Files\\Tencent\\Weixin\\Weixin.exe'
            ];
            
            let result = '路径检查结果：\n\n';
            paths.forEach(p => {
                // 通过 ActiveX 检查（仅 IE 模式）
                result += p + '\n';
            });
            
            result += '\n提示：如果路径存在但无法启动，可能是权限问题。';
            setStatus(result, 'info');
        }
    </script>
</body>
</html>
